<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" preserveAspectRatio="xMidYMid meet" style="background:white;max-height:300px">
  <style>
    text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    .shape { fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .shape-fill { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .label { fill: #1a1a1a; font-size: 15px; font-weight: 700; }
    .value { fill: #1565C0; font-size: 13px; font-weight: 600; }
    .dim { fill: #666; font-size: 12px; }
    .dashed { stroke-dasharray: 6,4; stroke: #888; stroke-width: 1.5; }
    .dotted { stroke-dasharray: 2,3; stroke: #aaa; stroke-width: 1; }
    .hatched { fill: url(#hatch); opacity: 0.4; }
    .angle-arc { fill: none; stroke: #E65100; stroke-width: 1.8; }
    .angle-fill { fill: #FFF3E0; stroke: #E65100; stroke-width: 1; opacity: 0.5; }
    .right-angle { fill: none; stroke: #333; stroke-width: 1.5; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis { stroke: #333; stroke-width: 1.5; }
    .point { fill: #D32F2F; }
    .arrow { fill: #333; stroke: #333; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      svg { background: #1a1a1a; }
      .shape { stroke: #e0e0e0; }
      .shape-fill { stroke: #e0e0e0; }
      .label { fill: #e0e0e0; }
      .value { fill: #64B5F6; }
      .dim { fill: #999; }
      .dashed { stroke: #aaa; }
      .dotted { stroke: #777; }
      .right-angle { stroke: #ccc; }
      .grid { stroke: #333; }
      .axis { stroke: #e0e0e0; }
      .point { fill: #EF5350; }
      .arrow { fill: #e0e0e0; stroke: #e0e0e0; }
      .angle-arc { stroke: #FF9800; }
      .angle-fill { fill: #3E2723; stroke: #FF9800; }
    }
  </style>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1565C0" stroke-width="1.5"/>
    </pattern>
    <pattern id="hatch-dark" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#64B5F6" stroke-width="1.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
  <polygon points="60,280 340,280 220,70" class="shape"/>
  <text x="40.14541716875904" y="289.4760508967286" class="label" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="359.47875386243476" y="290.22634577777825" class="label" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="222.08580003781591" y="48.09909960293305" class="label" text-anchor="middle" dominant-baseline="central">C</text>
  <path d="M 60,280 L 82.0,280.0 A 22,22 0 0 0 73.33295073578283,262.500502159285 Z" class="angle-fill"/>
  <path d="M 82.0,280.0 A 22,22 0 0 0 73.33295073578283,262.500502159285" class="angle-arc"/>
  <text x="91.36401551696625" y="264.46621325460205" class="value" text-anchor="middle" dominant-baseline="central">55°</text>
  <path d="M 340,280 L 329.08494335614967,260.8986508732619 A 22,22 0 0 0 318.0,280.0 Z" class="angle-fill"/>
  <path d="M 329.08494335614967,260.8986508732619 A 22,22 0 0 0 318.0,280.0" class="angle-arc"/>
  <text x="309.7281467408492" y="262.43256136323686" class="value" text-anchor="middle" dominant-baseline="central">65°</text>
  <path d="M 220,70 L 206.66704926421716,87.49949784071497 A 22,22 0 0 0 230.91505664385033,89.1013491267381 Z" class="angle-fill"/>
  <path d="M 206.66704926421716,87.49949784071497 A 22,22 0 0 0 230.91505664385033,89.1013491267381" class="angle-arc"/>
  <text x="217.69288842625247" y="104.92387773696214" class="value" text-anchor="middle" dominant-baseline="central">x</text>
</svg>