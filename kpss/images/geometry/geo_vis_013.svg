<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" preserveAspectRatio="xMidYMid meet" style="background:white;max-height:300px">
  <style>
    text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    .shape { fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .shape-fill { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .label { fill: #1a1a1a; font-size: 15px; font-weight: 700; }
    .value { fill: #1565C0; font-size: 13px; font-weight: 600; }
    .dim { fill: #666; font-size: 12px; }
    .dashed { stroke-dasharray: 6,4; stroke: #888; stroke-width: 1.5; }
    .dotted { stroke-dasharray: 2,3; stroke: #aaa; stroke-width: 1; }
    .hatched { fill: url(#hatch); opacity: 0.4; }
    .angle-arc { fill: none; stroke: #E65100; stroke-width: 1.8; }
    .angle-fill { fill: #FFF3E0; stroke: #E65100; stroke-width: 1; opacity: 0.5; }
    .right-angle { fill: none; stroke: #333; stroke-width: 1.5; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis { stroke: #333; stroke-width: 1.5; }
    .point { fill: #D32F2F; }
    .arrow { fill: #333; stroke: #333; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      svg { background: #1a1a1a; }
      .shape { stroke: #e0e0e0; }
      .shape-fill { stroke: #e0e0e0; }
      .label { fill: #e0e0e0; }
      .value { fill: #64B5F6; }
      .dim { fill: #999; }
      .dashed { stroke: #aaa; }
      .dotted { stroke: #777; }
      .right-angle { stroke: #ccc; }
      .grid { stroke: #333; }
      .axis { stroke: #e0e0e0; }
      .point { fill: #EF5350; }
      .arrow { fill: #e0e0e0; stroke: #e0e0e0; }
      .angle-arc { stroke: #FF9800; }
      .angle-fill { fill: #3E2723; stroke: #FF9800; }
    }
  </style>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1565C0" stroke-width="1.5"/>
    </pattern>
    <pattern id="hatch-dark" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#64B5F6" stroke-width="1.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
  <polygon points="60,280 300,280 60,80" class="shape"/>
  <text x="43.09913184885773" y="294.0840567926186" class="label" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="320.3076923076923" y="288.46153846153845" class="label" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="48.68109338059442" y="61.13515563432403" class="label" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="180.0" y="262.0" class="value" text-anchor="middle" dominant-baseline="central">8√3</text>
  <path d="M 60,280 L 82.0,280.0 A 22,22 0 0 0 60.0,258.0 Z" class="angle-fill"/>
  <path d="M 82.0,280.0 A 22,22 0 0 0 60.0,258.0" class="angle-arc"/>
  <text x="84.74873734152916" y="255.25126265847084" class="value" text-anchor="middle" dominant-baseline="central">90°</text>
  <path d="M 300,280 L 283.0991318488577,265.9159432073814 A 22,22 0 0 0 278.0,280.0 Z" class="angle-fill"/>
  <path d="M 283.0991318488577,265.9159432073814 A 22,22 0 0 0 278.0,280.0" class="angle-arc"/>
  <text x="267.0904947810911" y="268.08511576864436" class="value" text-anchor="middle" dominant-baseline="central">30°</text>
  <path d="M 60,80 L 60.0,102.0 A 22,22 0 0 0 76.90086815114228,94.08405679261855 Z" class="angle-fill"/>
  <path d="M 60.0,102.0 A 22,22 0 0 0 76.90086815114228,94.08405679261855" class="angle-arc"/>
  <text x="74.84543886874033" y="111.6956297428288" class="value" text-anchor="middle" dominant-baseline="central">60°</text>
</svg>