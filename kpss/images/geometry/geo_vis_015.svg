<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" style="background:white">
  <style>
    text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    .shape { fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .shape-fill { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .label { fill: #1a1a1a; font-size: 15px; font-weight: 700; }
    .value { fill: #1565C0; font-size: 13px; font-weight: 600; }
    .dim { fill: #666; font-size: 12px; }
    .dashed { stroke-dasharray: 6,4; stroke: #888; stroke-width: 1.5; }
    .dotted { stroke-dasharray: 2,3; stroke: #aaa; stroke-width: 1; }
    .hatched { fill: url(#hatch); opacity: 0.4; }
    .angle-arc { fill: none; stroke: #E65100; stroke-width: 1.8; }
    .angle-fill { fill: #FFF3E0; stroke: #E65100; stroke-width: 1; opacity: 0.5; }
    .right-angle { fill: none; stroke: #333; stroke-width: 1.5; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis { stroke: #333; stroke-width: 1.5; }
    .point { fill: #D32F2F; }
    .arrow { fill: #333; stroke: #333; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      svg { background: #1a1a1a; }
      .shape { stroke: #e0e0e0; }
      .shape-fill { stroke: #e0e0e0; }
      .label { fill: #e0e0e0; }
      .value { fill: #64B5F6; }
      .dim { fill: #999; }
      .dashed { stroke: #aaa; }
      .dotted { stroke: #777; }
      .right-angle { stroke: #ccc; }
      .grid { stroke: #333; }
      .axis { stroke: #e0e0e0; }
      .point { fill: #EF5350; }
      .arrow { fill: #e0e0e0; stroke: #e0e0e0; }
      .angle-arc { stroke: #FF9800; }
      .angle-fill { fill: #3E2723; stroke: #FF9800; }
    }
  </style>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1565C0" stroke-width="1.5"/>
    </pattern>
    <pattern id="hatch-dark" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#64B5F6" stroke-width="1.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
  <polygon points="80,260 320,260 180,80" class="shape"/>
  <text x="60.556665840364644" y="270.2935298492187" class="label" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="339.88223245565786" y="269.417899584259" class="label" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="177.57050642635338" y="58.13455783718038" class="label" text-anchor="middle" dominant-baseline="central">C</text>
  <path d="M 80,260 L 102.0,260.0 A 22,22 0 0 0 90.6841444859299,240.76853992532617 Z" class="angle-fill"/>
  <path d="M 102.0,260.0 A 22,22 0 0 0 90.6841444859299,240.76853992532617" class="angle-arc"/>
  <text x="110.16548185172768" y="242.25052945428828" class="value" text-anchor="middle" dominant-baseline="central">50°</text>
  <path d="M 180,80 L 169.3158555140701,99.23146007467383 A 22,22 0 0 0 193.50669349732826,97.36574878227918 Z" class="angle-fill"/>
  <path d="M 169.3158555140701,99.23146007467383 A 22,22 0 0 0 193.50669349732826,97.36574878227918" class="angle-arc"/>
  <text x="182.69137217651198" y="114.89636823234615" class="value" text-anchor="middle" dominant-baseline="central">70°</text>
  <line x1="320" y1="260" x2="400" y2="260" class="dashed"/>
  <text x="365" y="245" class="value" text-anchor="middle" dominant-baseline="central">x</text>
</svg>