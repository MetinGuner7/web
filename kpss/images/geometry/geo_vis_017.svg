<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" style="background:white">
  <style>
    text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    .shape { fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .shape-fill { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; }
    .label { fill: #1a1a1a; font-size: 15px; font-weight: 700; }
    .value { fill: #1565C0; font-size: 13px; font-weight: 600; }
    .dim { fill: #666; font-size: 12px; }
    .dashed { stroke-dasharray: 6,4; stroke: #888; stroke-width: 1.5; }
    .dotted { stroke-dasharray: 2,3; stroke: #aaa; stroke-width: 1; }
    .hatched { fill: url(#hatch); opacity: 0.4; }
    .angle-arc { fill: none; stroke: #E65100; stroke-width: 1.8; }
    .angle-fill { fill: #FFF3E0; stroke: #E65100; stroke-width: 1; opacity: 0.5; }
    .right-angle { fill: none; stroke: #333; stroke-width: 1.5; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis { stroke: #333; stroke-width: 1.5; }
    .point { fill: #D32F2F; }
    .arrow { fill: #333; stroke: #333; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      svg { background: #1a1a1a; }
      .shape { stroke: #e0e0e0; }
      .shape-fill { stroke: #e0e0e0; }
      .label { fill: #e0e0e0; }
      .value { fill: #64B5F6; }
      .dim { fill: #999; }
      .dashed { stroke: #aaa; }
      .dotted { stroke: #777; }
      .right-angle { stroke: #ccc; }
      .grid { stroke: #333; }
      .axis { stroke: #e0e0e0; }
      .point { fill: #EF5350; }
      .arrow { fill: #e0e0e0; stroke: #e0e0e0; }
      .angle-arc { stroke: #FF9800; }
      .angle-fill { fill: #3E2723; stroke: #FF9800; }
    }
  </style>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1565C0" stroke-width="1.5"/>
    </pattern>
    <pattern id="hatch-dark" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#64B5F6" stroke-width="1.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
  <polygon points="40,300 250,300 150,100" class="shape"/>
  <text x="21.344037311888062" y="311.65997668007" class="label" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="268.4865262609334" y="311.926791136086" class="label" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="150.54982820552448" y="78.0068717790213" class="label" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="145.0" y="282.0" class="value" text-anchor="middle" dominant-baseline="central">10</text>
  <text x="183.90031056200152" y="208.04984471899925" class="value" text-anchor="middle" dominant-baseline="central">8</text>
  <text x="79.22811364382035" y="191.32546250410118" class="value" text-anchor="middle" dominant-baseline="central">6</text>
  <polygon points="270,300 370,300 320,200" class="shape"/>
  <text x="251.69489352456745" y="312.203404316955" class="label" text-anchor="middle" dominant-baseline="central">D</text>
  <text x="388.3051064754326" y="312.203404316955" class="label" text-anchor="middle" dominant-baseline="central">E</text>
  <text x="320.0" y="178.0" class="label" text-anchor="middle" dominant-baseline="central">F</text>
  <text x="320.0" y="282.0" class="value" text-anchor="middle" dominant-baseline="central">5</text>
  <text x="328.9003105620015" y="258.0498447189992" class="value" text-anchor="middle" dominant-baseline="central">?</text>
</svg>